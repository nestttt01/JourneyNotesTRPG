<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pixel Heart Reference Redraw</title>
<style>
@font-face { font-family: "TRPG Cubic Pixel"; src: url("./fonts/Cubic_11.woff2") format("woff2"); font-display: swap; }
:root {
  --bg: #fff4f8;
  --card: #fffefe;
  --ink: #2d2535;
  --line: #49395f;
  --line-dark: #332746;
  --fill: #ff5b97;
  --fill-light: #ff8dba;
  --fill-dark: #ec3f80;
  --shine: #fff1f7;
  --empty: #fff9ff;
  --empty-tint: #f3edf9;
  --rule: #e7d8e3;
  --spark: #ffe96b;
  --spark-hot: #ffffff;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  padding: 28px;
  background: var(--bg);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
}
main { width: min(1160px, 100%); margin: 0 auto; display: grid; gap: 18px; }
h1 { margin: 0; font-family: "TRPG Cubic Pixel", monospace; font-size: clamp(28px, 5vw, 44px); font-weight: 400; }
p { margin: 6px 0 0; color: #806b78; font-weight: 800; line-height: 1.55; }
.preview-card {
  background: var(--card);
  border: 3px solid var(--line-dark);
  box-shadow: 6px 6px 0 #d5c5ff;
  padding: 24px 28px;
}
.stage { display: grid; grid-template-columns: minmax(300px, 420px) 1fr; gap: 34px; align-items: start; }
.big-wrap { display: grid; place-items: center; gap: 14px; padding-top: 10px; }
.grid-note { color: #806b78; font-weight: 900; }
.samples { display: grid; gap: 14px; padding-top: 4px; }
.npc-row {
  display: grid;
  grid-template-columns: minmax(120px, 1fr) auto;
  align-items: center;
  gap: 16px;
  min-height: 48px;
  border-bottom: 2px dotted var(--rule);
}
.name { font-weight: 950; font-size: 24px; }
.pixel-heart {
  --u: 4px;
  position: relative;
  width: calc(10 * var(--u));
  height: calc(8 * var(--u));
  flex: 0 0 auto;
  image-rendering: pixelated;
  shape-rendering: crispEdges;
}
.pixel-heart.big { --u: 18px; }
.pixel-heart .px,
.pixel-heart .spark {
  position: absolute;
  width: var(--u);
  height: var(--u);
  left: calc(var(--x) * var(--u));
  top: calc(var(--y) * var(--u));
  background: var(--c);
}
.pixel-heart .spark {
  display: none;
  background: var(--spark);
}
.pixel-heart:not(.full) {
  animation: heart-float 2.8s ease-in-out infinite;
}
.pixel-heart.full {
  animation: heart-hop 1.35s steps(1, end) infinite;
  filter: drop-shadow(0 0 0 var(--spark));
}
.pixel-heart.full .spark { display: block; animation: sparkle-pop 1.35s steps(1, end) infinite; }
.pixel-heart.full .spark.hot { background: var(--spark-hot); }
.pixel-heart.full .spark.s2 { animation-delay: .18s; }
.pixel-heart.full .spark.s3 { animation-delay: .36s; }
@keyframes heart-float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(calc(-0.5 * var(--u))); }
}
@keyframes heart-hop {
  0%, 58%, 100% { transform: translateY(0); filter: drop-shadow(0 0 0 transparent); }
  18%, 28% { transform: translateY(calc(-1 * var(--u))); filter: drop-shadow(0 0 3px var(--spark)); }
  38% { transform: translateY(0); filter: drop-shadow(0 0 5px var(--spark)); }
}
@keyframes sparkle-pop {
  0%, 16%, 52%, 100% { opacity: 0; }
  24%, 42% { opacity: 1; }
}
.legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 18px; color: #806b78; font-weight: 900; }
.legend span { display: inline-flex; align-items: center; gap: 6px; }
.swatch { width: 14px; height: 14px; border: 2px solid var(--line-dark); background: var(--fill); image-rendering: pixelated; }
.swatch.line { background: var(--line); }
.swatch.empty { background: var(--empty); }
@media (max-width: 760px) {
  body { padding: 14px; }
  .preview-card { padding: 18px; }
  .stage { grid-template-columns: 1fr; }
  .pixel-heart.big { --u: 14px; }
}
</style>
</head>
<body>
<main>
  <header>
    <h1>Pixel Heart Redraw</h1>
    <p>Reference-following version: mirrored 10x8 sprite, bottom closes with 2 pixels, no rotation, no overlapping outline/fill.</p>
  </header>
  <section class="preview-card">
    <div class="stage">
      <div class="big-wrap">
        <div id="heart-big" class="pixel-heart big full" aria-label="100 affection pixel heart"></div>
        <div class="grid-note">10x8 fixed pixel grid, 100% state</div>
      </div>
      <div class="samples">
        <div class="npc-row"><span class="name">NPC 100</span><div class="pixel-heart full" data-level="100"></div></div>
        <div class="npc-row"><span class="name">NPC 75</span><div class="pixel-heart" data-level="75"></div></div>
        <div class="npc-row"><span class="name">NPC 45</span><div class="pixel-heart" data-level="45"></div></div>
        <div class="npc-row"><span class="name">NPC 15</span><div class="pixel-heart" data-level="15"></div></div>
        <div class="npc-row"><span class="name">NPC 0</span><div class="pixel-heart" data-level="0"></div></div>
        <div class="legend">
          <span><i class="swatch line"></i>outline only</span>
          <span><i class="swatch"></i>fill cells</span>
          <span><i class="swatch empty"></i>empty interior</span>
        </div>
      </div>
    </div>
  </section>
</main>
<script>
const spriteRows = [
  [[2, 3], [6, 7]],
  [[1, 4], [5, 8]],
  [[0, 9]],
  [[0, 9]],
  [[1, 8]],
  [[2, 7]],
  [[3, 6]],
  [[4, 5]],
];
const W = 10;
const H = 8;
const colors = {
  line: getComputedStyle(document.documentElement).getPropertyValue('--line').trim(),
  lineDark: getComputedStyle(document.documentElement).getPropertyValue('--line-dark').trim(),
  fill: getComputedStyle(document.documentElement).getPropertyValue('--fill').trim(),
  fillLight: getComputedStyle(document.documentElement).getPropertyValue('--fill-light').trim(),
  fillDark: getComputedStyle(document.documentElement).getPropertyValue('--fill-dark').trim(),
  shine: getComputedStyle(document.documentElement).getPropertyValue('--shine').trim(),
  empty: getComputedStyle(document.documentElement).getPropertyValue('--empty').trim(),
  emptyTint: getComputedStyle(document.documentElement).getPropertyValue('--empty-tint').trim(),
};
function makeSet(rows) {
  const set = new Set();
  rows.forEach((ranges, y) => {
    ranges.forEach(([a, b]) => {
      for (let x = a; x <= b; x += 1) set.add(`${x},${y}`);
    });
  });
  return set;
}
const cells = makeSet(spriteRows);
function has(x, y) { return cells.has(`${x},${y}`); }
function isOutline(x, y) {
  return !has(x - 1, y) || !has(x + 1, y) || !has(x, y - 1) || !has(x, y + 1);
}
function px(x, y, color, cls = '') {
  const node = document.createElement('span');
  node.className = `px${cls ? ` ${cls}` : ''}`;
  node.style.setProperty('--x', x);
  node.style.setProperty('--y', y);
  node.style.setProperty('--c', color);
  return node;
}
function spark(x, y, cls = '') {
  const node = document.createElement('span');
  node.className = `spark ${cls}`;
  node.style.setProperty('--x', x);
  node.style.setProperty('--y', y);
  return node;
}
function renderHeart(el, level) {
  const value = Number.isFinite(level) ? level : Number(el.dataset.level || 100);
  const percent = Math.max(0, Math.min(100, value));
  let cutoff = H - Math.round(percent / 100 * H);
  if (percent > 0 && percent < 25) cutoff = H - 3;
  el.textContent = '';
  for (let y = 0; y < H; y += 1) {
    for (let x = 0; x < W; x += 1) {
      if (!has(x, y)) continue;
      if (isOutline(x, y)) {
        el.appendChild(px(x, y, y >= 6 ? colors.lineDark : colors.line));
        continue;
      }
      const filled = y >= cutoff;
      if (!filled) {
        el.appendChild(px(x, y, (x + y) % 2 ? colors.emptyTint : colors.empty));
        continue;
      }
      const fillColor = y <= 2 ? colors.fillLight : (y >= 5 ? colors.fillDark : colors.fill);
      el.appendChild(px(x, y, fillColor));
    }
  }
  if (value >= 100) {
    [[2,2], [3,2], [2,3]].forEach(([x, y]) => {
      if (has(x, y) && !isOutline(x, y)) el.appendChild(px(x, y, colors.shine));
    });
    [[-1,1,'hot'], [10,2,'s2'], [1,-1,'s3'], [8,-1,'hot s2'], [10,6,'s3']].forEach(([x, y, cls]) => el.appendChild(spark(x, y, cls)));
  }
}
document.querySelectorAll('.pixel-heart').forEach((el) => renderHeart(el, el.id === 'heart-big' ? 100 : undefined));
</script>
</body>
</html>
