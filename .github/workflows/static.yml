# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 只保留最新一次部署：連續 push 時取消還在跑的舊 run，
# 避免同一個 concurrency group 產生兩份 github-pages artifact 而部署失敗。
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy3.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Validate static sources
        shell: bash
        run: |
          set -euo pipefail
          for file in i18n.js app-*.js; do
            node --check "$file"
          done
          python3 - <<'PY'
          from pathlib import Path

          source_files = [Path("index.html"), Path("style.css"), Path("i18n.js"), *Path(".").glob("app-*.js")]
          for source_file in source_files:
              raw = source_file.read_bytes()
              assert not raw.startswith(b"\xef\xbb\xbf"), f"BOM found: {source_file}"
              text = raw.decode("utf-8", errors="strict")
              assert "\r" not in text, f"CR/CRLF found: {source_file}"
              assert "\ufffd" not in text, f"replacement character found: {source_file}"
          html = Path("index.html").read_text(encoding="utf-8")
          css = Path("style.css").read_text(encoding="utf-8")
          assert html.rstrip().endswith("</html>"), "index.html is truncated"
          assert css.count("{") == css.count("}"), "style.css braces are unbalanced"
          assert css.rstrip().endswith("}"), "style.css is truncated"
          PY
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      # GitHub Pages 後端偶爾會回「try again later」，以下最多自動重試 3 次，
      # 讓暫時性失敗自己復原，不必手動開新 run。artifact 只上傳一次，不會重複。
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v5
      - name: Wait before retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 30
      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v5
      - name: Wait before final attempt
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 45
      - name: Deploy to GitHub Pages (final attempt)
        id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v5
